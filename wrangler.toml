name = "mangoi-ai-avatar-cf"
main = "src/index.js"
compatibility_date = "2025-05-01"

# 정적 자산(public/) + Worker(API) 함께 배포.
# 정적 파일이 먼저 서빙되고, /api/chat 같은 비-자산 경로만 Worker 가 처리합니다.
[assets]
directory = "./public"
binding = "ASSETS"

# Cloudflare Workers AI (외부 키 불필요)
[ai]
binding = "AI"

# 환경변수(시크릿)는 코드/깃허브에 적지 않습니다.
# 챗/STT 는 위 Workers AI(AI 바인딩)로 동작하며 별도 키가 필요 없습니다.
# TTS(Typecast)만 키가 필요합니다(없으면 브라우저 음성으로 자동 폴백):
# 운영 키:  Cloudflare 대시보드 → 이 Worker → Settings → Variables and Secrets → TYPECAST_API_KEY
#   또는:  npx wrangler secret put TYPECAST_API_KEY
# 로컬 키:  .dev.vars 파일의 TYPECAST_API_KEY (git 에 안 올라감)
# (선택) 고정 보이스: TYPECAST_VOICE_ID(운영비서) / TYPECAST_VOICE_ID_STUDENT(학생)
