<!--
  망고아이 AI 상담직원 — 사이트/앱 임베드 위젯
  사용법:
    1) 아래 코드를 망고아이 웹(또는 모바일 웹) 페이지의 </body> 바로 위에 붙여넣으세요.
    2) iframe 의 src 를 Cloudflare Pages 배포 주소로 바꾸세요.
       (예: https://mangoi-ai-avatar.pages.dev)
  동작: 우측 하단 토글 버튼(💁‍♀️)으로 상담창을 열고 닫습니다. 모바일에서는 화면에 맞춰 커집니다.
-->
<div id="mangoi-widget">
  <iframe id="mangoi-frame"
    src="https://mangoi-ai-avatar-cf.navy111p.workers.dev"
    allow="autoplay; microphone"
    title="망고아이 AI 상담직원"></iframe>
  <button id="mangoi-toggle" aria-label="AI 상담직원 열기">💁‍♀️</button>
</div>
<style>
  #mangoi-widget { position:fixed; right:20px; bottom:20px; z-index:2147483000; }
  #mangoi-frame { display:none; width:380px; height:620px; max-width:calc(100vw - 40px);
    max-height:calc(100vh - 100px); border:none; border-radius:20px;
    box-shadow:0 12px 40px rgba(0,0,0,0.35); background:#111; }
  #mangoi-widget.open #mangoi-frame { display:block; }
  #mangoi-toggle { margin-top:10px; margin-left:auto; display:block; width:60px; height:60px;
    border:none; border-radius:50%; background:#ffcc00; color:#1a1a1a; font-size:28px;
    cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,0.3); }
  @media (max-width:480px){
    #mangoi-frame{ width:calc(100vw - 24px); height:75vh; }
    #mangoi-widget{ right:12px; bottom:12px; }
  }
</style>
<script>
  (function(){
    var w=document.getElementById("mangoi-widget"),
        t=document.getElementById("mangoi-toggle");
    function setOpen(open){
      w.classList.toggle("open", open);
      t.textContent = open ? "✖️" : "💁‍♀️";
      t.setAttribute("aria-label", open ? "AI 상담직원 닫기" : "AI 상담직원 열기");
    }
    t.addEventListener("click", function(){ setOpen(!w.classList.contains("open")); });
    // 상담창 안의 ❌ 버튼이 보내는 닫기 신호 처리
    window.addEventListener("message", function(e){
      if(e.data === "mangoi-avatar-close") setOpen(false);
    });
  })();
</script>
