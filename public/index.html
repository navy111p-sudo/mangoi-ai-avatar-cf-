<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>망고아이 AI 상담직원</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:transparent; }
  #avatar-window { position:fixed; inset:0; width:100%; height:100%;
    background:rgba(20,20,25,0.96); border-radius:18px; overflow:hidden;
    display:flex; flex-direction:column; }
  #avatar-window.hidden { display:none; }
  #toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 12px;
    background:rgba(255,204,0,0.12); border-bottom:1px solid rgba(255,204,0,0.35); flex:0 0 auto; }
  #toolbar .title { color:#ffcc00; font-weight:700; font-size:15px; }
  #toolbar .controls button { background:transparent; border:none; cursor:pointer; font-size:17px;
    margin-left:6px; padding:2px 6px; border-radius:6px; }
  #toolbar .controls button:hover { background:rgba(255,255,255,0.12); }
  /* 하트 프레임 영상 아바타 */
  #avatar-area { position:relative; width:100%; height:250px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    background:radial-gradient(circle at 50% 40%, #2a2f3a 0%, #14141a 100%); }
  #avatar-video { width:250px; height:250px; object-fit:cover; object-position:center 22%; display:block;
    -webkit-clip-path:url(#heartClip); clip-path:url(#heartClip);
    filter:drop-shadow(0 6px 16px rgba(0,0,0,0.45)); background:#000; }
  #speaking-dot { position:absolute; top:10px; left:12px; background:rgba(0,0,0,0.55); color:#ffcc00;
    font-size:12px; padding:5px 10px; border-radius:12px; z-index:2; }
  #speaking-dot.hidden { display:none; }
  #subtitle { color:#fff; font-size:15px; line-height:1.6; padding:14px 16px; min-height:60px;
    flex:1 1 auto; overflow-y:auto; background:rgba(0,0,0,0.30); }
  #chat-area { display:flex; gap:8px; padding:12px; background:rgba(0,0,0,0.25); flex:0 0 auto; }
  #chat-input { flex:1; border:1px solid rgba(255,204,0,0.5); border-radius:12px; padding:12px 14px;
    font-size:16px; background:rgba(255,255,255,0.95); outline:none; }
  #send-btn { background:#ffcc00; color:#1a1a1a; border:none; border-radius:12px; padding:0 18px; font-weight:700; cursor:pointer; font-size:15px; }
  #send-btn:disabled { opacity:0.5; cursor:not-allowed; }
  #mic-btn { width:44px; height:44px; flex:0 0 auto; border:none; border-radius:50%;
    background:rgba(255,255,255,0.92); color:#1a1a1a; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0; }
  #mic-btn.listening { background:#e53935; color:#fff; animation:micPulse 1s infinite; }
  @keyframes micPulse { 0%{ box-shadow:0 0 0 0 rgba(229,57,53,0.6); } 70%{ box-shadow:0 0 0 10px rgba(229,57,53,0); } 100%{ box-shadow:0 0 0 0 rgba(229,57,53,0); } }
</style>
</head>
<body>
  <!-- 하트 모양 클립(영상 프레임용) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
      <path d="M0.5,0.30 C0.5,0.18 0.36,0.04 0.20,0.09 C0.04,0.14 0.01,0.34 0.10,0.50 C0.18,0.66 0.37,0.81 0.5,0.96 C0.63,0.81 0.82,0.66 0.90,0.50 C0.99,0.34 0.96,0.14 0.80,0.09 C0.64,0.04 0.5,0.18 0.5,0.30 Z"/>
    </clipPath>
  </defs></svg>

  <div id="avatar-window">
    <div id="toolbar">
      <span class="title">💁‍♀️ 망고아이 상담직원</span>
      <span class="controls">
        <button id="replay-btn" title="음성 다시듣기">🔁</button>
        <button id="close-btn" title="닫기">❌</button>
      </span>
    </div>
    <div id="avatar-area">
      <video id="avatar-video"
        src="https://webrtc-unified-platform.navy111p.workers.dev/video/postpone-guide.mp4"
        muted loop playsinline preload="auto"></video>
      <div id="speaking-dot" class="hidden">🔊 말하는 중...</div>
    </div>
    <div id="subtitle">안녕하세요! 망고아이 상담직원이에요 😊 무엇이든 물어보세요!</div>
    <div id="chat-area">
      <input id="chat-input" type="text" placeholder="궁금한 점을 물어보세요!" autocomplete="off" />
      <button id="mic-btn" type="button" aria-label="음성으로 질문하기" title="음성으로 질문하기">🎤</button>
      <button id="send-btn">전송</button>
    </div>
  </div>

<script>
  var subtitle=document.getElementById("subtitle");
  var input=document.getElementById("chat-input");
  var sendBtn=document.getElementById("send-btn");
  var replayBtn=document.getElementById("replay-btn");
  var closeBtn=document.getElementById("close-btn");
  var win=document.getElementById("avatar-window");
  var speakingDot=document.getElementById("speaking-dot");
  var video=document.getElementById("avatar-video");

  // 평소엔 입 닫힘(정지). 말할 때만 영상 재생 → 입 움직임.
  try{ video.pause(); video.currentTime=0; }catch(e){}
  video.addEventListener("loadeddata", function(){ try{ video.pause(); video.currentTime=0; }catch(e){} });
  // 영상 로드 실패 시 깔끔히 숨김(배경 그라데이션 유지)
  video.addEventListener("error", function(){ video.style.opacity="0"; });

  var lastAnswer="";
  var lastBlobUrl=null;
  var uiLang="ko";
  function startMouth(){
    speakingDot.classList.remove("hidden");
    if(ensureLipGraph()){
      try{ if(actx && actx.state==="suspended") actx.resume(); }catch(e){}
      if(!lipRAF) lipRAF=requestAnimationFrame(lipLoop);
    } else {
      try{ video.play(); }catch(e){}                 // WebAudio 미지원/실패 → 기존 동작 폴백
    }
  }
  function stopMouth(){
    speakingDot.classList.add("hidden");
    if(lipRAF){ try{ cancelAnimationFrame(lipRAF); }catch(e){} lipRAF=0; }
    try{ video.pause(); }catch(e){}
  }
  // 브라우저 내장 음성(영어/폴백)용 입모양: 오디오 분석 없이 영상 루프 재생
  function startMouthPlain(){ speakingDot.classList.remove("hidden"); try{ video.play(); }catch(e){} }

  // === 음성: 1순위 타입캐스트(서버), 실패 시 브라우저 음성 ===
  var audioEl = new Audio();
  // 모바일(안드로이드 Chrome) 자동재생 정책 우회: 첫 사용자 제스처에서 오디오/영상 잠금 해제
  var __mu=false;function __unlock(){if(__mu)return;__mu=true;try{if(actx&&actx.state==="suspended")actx.resume();}catch(e){}try{var p=audioEl.play();if(p&&p.then)p.then(function(){audioEl.pause();audioEl.currentTime=0;}).catch(function(){});}catch(e){}try{var pv=video.play();if(pv&&pv.then)pv.then(function(){video.pause();video.currentTime=0;}).catch(function(){});}catch(e){}}
  ["touchstart","pointerdown","mousedown","click","keydown"].forEach(function(ev){document.addEventListener(ev,__unlock,{passive:true});});
  audioEl.addEventListener("playing", startMouth);
  audioEl.addEventListener("ended", stopMouth);
  audioEl.addEventListener("pause", stopMouth);
  audioEl.addEventListener("error", stopMouth);

  // === 음량 기반 립싱크 (Web Audio) — 음소 모양은 못 바꾸지만 음량으로 입 움직임 강약 ===
  var actx=null, srcNode=null, analyser=null, lipData=null, lipRAF=0, lipReady=false, lipFailed=false;
  function ensureLipGraph(){            // 엘리먼트당 createMediaElementSource는 1회 → 지연 1회 생성
    if(lipReady) return true;
    if(lipFailed) return false;
    try{
      var AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) throw new Error("no WebAudio");
      actx=new AC();
      srcNode=actx.createMediaElementSource(audioEl);
      srcNode.connect(actx.destination);             // 1) 소리 경로 먼저 보장(필수 — 안 하면 무음)
      analyser=actx.createAnalyser(); analyser.fftSize=512;
      srcNode.connect(analyser);                      // 2) 분석용 탭(destination 연결 불필요)
      lipData=new Uint8Array(analyser.fftSize);
      lipReady=true;
      return true;
    }catch(e){
      lipFailed=true;                                 // 실패 → 재시도 안 함, video.play() 폴백
      try{ if(actx) actx.close(); }catch(_){}
      actx=null; srcNode=null; analyser=null;
      return false;
    }
  }
  function lipLoop(){
    if(!lipReady){ lipRAF=0; return; }
    analyser.getByteTimeDomainData(lipData);
    var sum=0;
    for(var i=0;i<lipData.length;i++){ var v=(lipData[i]-128)/128; sum+=v*v; }
    var level=Math.sqrt(sum/lipData.length);          // RMS 0~1
    if(level>0.06){
      try{ if(video.paused) video.play(); video.playbackRate=0.7+level*1.1; }catch(e){}
    } else {
      try{ if(!video.paused) video.pause(); }catch(e){}
    }
    lipRAF=requestAnimationFrame(lipLoop);
  }

  var koVoice=null, enVoice=null;
  function pickVoice(){ var vs=window.speechSynthesis?speechSynthesis.getVoices():[];
    koVoice=vs.filter(function(v){return /ko/i.test(v.lang);})[0]||null;
    enVoice=vs.filter(function(v){return /^en/i.test(v.lang);})[0]||null; }
  if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
  function speakBrowser(text){
    if(!window.speechSynthesis){ startMouthPlain(); setTimeout(stopMouth, Math.min(12000, Math.max(1500, text.length*90))); return; }
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    if(/[가-힣]/.test(text)){ u.lang="ko-KR"; if(koVoice) u.voice=koVoice; u.rate=1.0; u.pitch=1.05; }
    else { u.lang="en-US"; if(enVoice) u.voice=enVoice; u.rate=1.0; u.pitch=1.0; }
    u.onstart=startMouthPlain; u.onend=stopMouth; u.onerror=stopMouth;
    speechSynthesis.speak(u);
  }

  // === 음성 정지: 진행 중 TTS fetch 취소 + 재생/입모양 중단 ===
  var ttsAbort=null, speakSeq=0;
  function stopSpeaking(){
    speakSeq++;                                 // 진행 중 시퀀스 무효화(늦게 온 TTS 폐기)
    try{ if(ttsAbort) ttsAbort.abort(); }catch(e){}
    ttsAbort=null;
    try{ speechSynthesis.cancel(); }catch(e){}
    try{ audioEl.pause(); audioEl.currentTime=0; }catch(e){}
    stopMouth();
  }

  function speak(text){
    lastAnswer=text;
    stopListening();                            // 답변 재생 시작 → 듣기 중이면 정지(에코 방지)
    stopSpeaking();                             // 이전 음성/입모양 정지 + 토큰 증가
    if(!/[가-힣]/.test(text)){ speakBrowser(text); return; }   // 답변에 한글 없음 → 영어로 간주: 브라우저 음성
    var mySeq=speakSeq;                         // 이 호출의 시퀀스
    var ac=("AbortController" in window)?new AbortController():null;
    ttsAbort=ac;
    fetch("/api/tts",{ method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:text}), signal: ac?ac.signal:undefined })
      .then(function(r){ if(!r.ok) throw new Error("tts "+r.status); return r.blob(); })
      .then(function(blob){
        if(mySeq!==speakSeq) throw {name:"AbortError"};   // 늦게 도착 → 폐기(폴백 안 함)
        if(!blob || blob.size < 200) throw new Error("empty audio");
        if(lastBlobUrl){ try{ URL.revokeObjectURL(lastBlobUrl); }catch(e){} }
        lastBlobUrl = URL.createObjectURL(blob);
        audioEl.src = lastBlobUrl;
        return audioEl.play();
      })
      .then(function(){ if(mySeq===speakSeq) startMouth(); })
      .catch(function(err){
        if(err && err.name==="AbortError") return;        // 중단/취소는 브라우저 음성 폴백 안 함
        if(mySeq!==speakSeq) return;                       // 더 이상 최신 호출 아님
        speakBrowser(text);
      });
  }

  // === 정지 트리거: 부모(mangoi-stop) / 탭 숨김 / 페이지 이탈 ===
  window.addEventListener("message", function(ev){
    var d=ev.data;
    if(d==="mangoi-stop" || (d && d.type==="mangoi-stop")) stopSpeaking();
    if(d && d.type==="mangoi-lang" && d.lang) applyLang(d.lang);
  });
  document.addEventListener("visibilitychange", function(){ if(document.hidden) stopSpeaking(); });
  window.addEventListener("pagehide", stopSpeaking);

  // === 다국어(EN/KO): 부모 사이트 언어에 맞춰 UI 문구·인식·음성 전환 ===
  var I18N={
    ko:{ ph:"궁금한 점을 물어보세요!", send:"전송", mic:"음성으로 질문하기",
         greet:"안녕하세요! 망고아이 상담직원이에요 😊 무엇이든 물어보세요!" },
    en:{ ph:"Ask me anything!", send:"Send", mic:"Ask by voice",
         greet:"Hi! I'm Mangoi's AI assistant 😊 Ask me anything!" }
  };
  var DEFAULT_GREETS=[I18N.ko.greet, I18N.en.greet];
  function applyLang(l){
    if(l!=="en" && l!=="ko") return;
    if(l===uiLang) return;
    uiLang=l;
    try{ stopSpeaking(); }catch(e){}            // 전환 시 진행 중 음성 정지
    try{ stopListening(); }catch(e){}            //          진행 중 인식 정지
    var t=I18N[uiLang];
    if(input) input.placeholder=t.ph;
    if(typeof sendBtn!=="undefined" && sendBtn) sendBtn.textContent=t.send;
    if(typeof micBtn!=="undefined" && micBtn) micBtn.setAttribute("aria-label", t.mic);
    if(typeof recog!=="undefined" && recog) recog.lang=(uiLang==="en")?"en-US":"ko-KR";
    if(subtitle && DEFAULT_GREETS.indexOf((subtitle.textContent||"").trim())>=0){ subtitle.textContent=t.greet; }
  }
  // === 페이지 바로 열기 (아바타가 제안 → 사용자가 '네' 하면 홈페이지 메뉴 열기) ===
  var pendingGo=null;
  var GO_LABELS={ "lesson-enter":"수업 입장", "lesson-change":"연기/변경", "leveltest":"레벨테스트", "library":"자료실(교재)", "report":"평가표", "mypage":"마이페이지",
    "payment":"결제", "booking":"수업 신청", "precheck":"수업 진단", "teachers":"교사 소개",
    "review-quiz":"복습퀴즈", "all-menu":"전체메뉴" };
  // 코드 → 한국어 라벨/동의어 (모델이 태그를 빠뜨리고 본문에 흘렸을 때 추정)
  var CODE_LABELS_KO={ "report":["평가표","성적표"], "lesson-enter":["수업 입장","로비"], "lesson-change":["수업 연기","연기/변경","수업 변경"],
    "leveltest":["레벨테스트","레벨 테스트"], "library":["자료실","교재"], "mypage":["마이페이지"], "payment":["결제","수강권"],
    "booking":["수업 신청","예약"], "precheck":["수업 진단"], "teachers":["교사 소개"], "review-quiz":["복습퀴즈"], "all-menu":["전체메뉴"] };
  var HYPHEN_CODES=["lesson-enter","lesson-change","review-quiz","all-menu","leveltest","mypage","precheck"];
  function parseGo(raw){
    var go=null, m=raw.match(/\[\[\s*GO\s*:\s*([a-zA-Z_\-]+)\s*\]\]/i);
    if(m){ var c=m[1].toLowerCase().replace(/_/g,"-"); if(GO_LABELS[c]) go=c; }
    raw=raw.replace(/\[\[\s*GO\s*:[^\]]*\]\]/ig,"").replace(/\[\[\s*GO[^\]]*\]?\]?/ig,"").trim();
    // 폴백①: 본문에 흘린 코드 토큰(괄호로 감싼 코드 또는 하이픈 코드) 감지 + 제거
    if(!go){
      var all=Object.keys(GO_LABELS);
      for(var i=0;i<all.length;i++){
        var code=all[i];
        var reWrap=new RegExp("[\\(\\[]\\s*"+code+"\\s*[\\)\\]]","i");
        var reTok=new RegExp("(^|[^a-zA-Z])"+code+"([^a-zA-Z]|$)","i");
        if(reWrap.test(raw) || (HYPHEN_CODES.indexOf(code)>=0 && reTok.test(raw))){
          go=code;
          raw=raw.replace(new RegExp("[\\(\\[]\\s*"+code+"\\s*[\\)\\]]","ig"),"")
                 .replace(new RegExp("(^|[^a-zA-Z])"+code+"([^a-zA-Z]|$)","ig"),"$1$2");
          break;
        }
      }
      raw=raw.replace(/\s{2,}/g," ").replace(/\s+([.,!?])/g,"$1").trim();
    }
    // 폴백②: 한국어 라벨로 추정(자연스러운 한국어라 텍스트는 그대로 유지)
    if(!go){
      for(var code2 in CODE_LABELS_KO){ var ls=CODE_LABELS_KO[code2];
        for(var j=0;j<ls.length;j++){ if(raw.indexOf(ls[j])>=0){ go=code2; break; } }
        if(go) break; }
    }
    return { text:raw, go:go };
  }
  function hasOpenVerb(s){ return /(열어|보여|가줘|바로가|이동|open|show|go to|take me)/i.test(s||""); }
  function detectGoText(s){            // 텍스트에서 타깃 코드 추정(라벨/코드)
    if(!s) return null;
    for(var code in CODE_LABELS_KO){ var ls=CODE_LABELS_KO[code]; for(var i=0;i<ls.length;i++){ if(s.indexOf(ls[i])>=0) return code; } }
    var low=s.toLowerCase(), all=Object.keys(GO_LABELS);
    for(var j=0;j<all.length;j++){ var re=new RegExp("(^|[^a-z])"+all[j]+"([^a-z]|$)","i"); if(re.test(low)) return all[j]; }
    return null;
  }
  function openGoNow(go){
    var lb=GO_LABELS[go]||""; input.value="";
    if(uiLang==="en"){ subtitle.textContent="Opening the page for you. 😊"; speak("Opening the page for you."); }
    else { subtitle.textContent="네, "+lb+" 페이지를 열어드릴게요! 😊"; speak("네, "+lb+" 페이지를 열어드릴게요!"); }
    openParentPage(go); pendingGo=null; input.focus();
  }
  function norm(s){ return (s||"").replace(/[!.?~\s]/g,"").toLowerCase(); }
  function isYes(s){ return ["응","어","네","넵","예","옙","그래","그래요","좋아","좋아요","열어","열어줘","열어주세요","열어줄래","보여줘","보여주세요","가자","이동","ㅇㅇ","ㅇ","ok","okay","yes","y","네네","응응"].indexOf(norm(s))>=0; }
  function isNo(s){ return ["아니","아니요","아니오","노","괜찮아","괜찮아요","됐어","됐어요","싫어","나중에","no","n","ㄴㄴ","ㄴ"].indexOf(norm(s))>=0; }
  function openParentPage(go){ if(window.parent!==window){ window.parent.postMessage({type:"mangoi-open", go:go}, "*"); } }

  function deliver(ans, go){
    var p=parseGo(ans||"");
    pendingGo = (go && GO_LABELS[go]) ? go : p.go;  // 서버가 준 go 우선, 없으면 텍스트에서 추출
    subtitle.textContent=p.text; speak(p.text);
  }

  function send(){
    var msg=input.value.trim(); if(!msg) return;
    // "X 열어줘"처럼 열기동사+명확한 타깃을 한 번에 말하면 되묻지 않고 즉시 열기
    if(hasOpenVerb(msg)){ var gNow=detectGoText(msg); if(gNow){ openGoNow(gNow); return; } }
    // 페이지 열기 제안에 대한 응답 먼저 처리
    if(pendingGo){
      if(isYes(msg)){
        var go=pendingGo; pendingGo=null; input.value="";
        var label=GO_LABELS[go]||"";
        subtitle.textContent="네, "+label+" 페이지를 열어드릴게요! 😊";
        speak("네, "+label+" 페이지를 열어드릴게요!");
        openParentPage(go); input.focus(); return;
      }
      if(isNo(msg)){
        pendingGo=null; input.value="";
        deliver("네, 알겠어요! 다른 궁금한 점이 있으면 언제든 물어봐 주세요. 😊");
        input.focus(); return;
      }
      pendingGo=null; // 그 외 → 새 질문으로 처리
    }
    input.value=""; sendBtn.disabled=true; subtitle.textContent="답변을 준비하고 있어요...";
    fetch("/api/chat",{ method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg, lang:uiLang}) })
      .then(function(r){ return r.json(); })
      .then(function(d){ deliver(d.answer||"음, 다시 한 번 말씀해 주시겠어요?", d && d.go); })
      .catch(function(){ deliver("연결이 잠깐 끊겼어요. 다시 시도해 주세요."); })
      .then(function(){ sendBtn.disabled=false; input.focus(); });
  }

  sendBtn.addEventListener("click",send);
  input.addEventListener("keydown",function(e){ if(e.key==="Enter") send(); });
  // 질문 입력(포커스/타이핑) 시 부모 홈페이지 홍보영상 페이드아웃 트리거
  var __typedNotified=false;
  function notifyTyping(){ if(__typedNotified) return; __typedNotified=true;
    if(window.parent!==window){ try{ window.parent.postMessage({type:"mangoi-typing"},"*"); }catch(e){} } }
  input.addEventListener("focus", notifyTyping);
  input.addEventListener("input", notifyTyping);
  replayBtn.addEventListener("click",function(){ if(lastAnswer) speak(lastAnswer); });
  closeBtn.addEventListener("click",function(){
    stopSpeaking();
    if(window.parent!==window){ window.parent.postMessage("mangoi-avatar-close","*"); }
    else { win.classList.add("hidden"); }
  });

  // === 음성 입력(마이크) — ko-KR 음성인식 ===
  var micBtn=document.getElementById("mic-btn");
  var recog=null, listening=false, autoSend=true;
  function setListening(on){ listening=on; if(micBtn) micBtn.classList.toggle("listening", on); }
  function stopListening(){ if(recog && listening){ try{ recog.stop(); }catch(e){} } }
  (function initMic(){
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR || !micBtn){ if(micBtn) micBtn.style.display="none"; return; }   // 미지원(iOS 등) → 버튼 숨김
    recog = new SR();
    recog.lang="ko-KR"; recog.interimResults=true; recog.continuous=false; recog.maxAlternatives=1;
    recog.onstart=function(){ setListening(true); };
    recog.onend=function(){ setListening(false); };
    recog.onerror=function(e){
      setListening(false);
      var err=e&&e.error;
      if(err==="not-allowed" || err==="service-not-allowed"){
        subtitle.textContent="마이크 권한이 필요해요. 브라우저에서 허용해 주세요.";
      } // no-speech / aborted 등은 무시
    };
    recog.onresult=function(e){
      var txt="", finalTxt="";
      for(var i=e.resultIndex; i<e.results.length; i++){
        var r=e.results[i]; txt += r[0].transcript;
        if(r.isFinal) finalTxt += r[0].transcript;
      }
      input.value = txt;                 // 중간/최종 결과 실시간 반영
      notifyTyping();                    // 영상 메시지 페이드아웃 트리거(재사용)
      if(finalTxt && autoSend){ try{ recog.stop(); }catch(e){} send(); }  // 최종 → 자동 전송
    };
    micBtn.addEventListener("click", function(){
      if(listening){ try{ recog.stop(); }catch(e){} return; }
      stopSpeaking();                    // 에코 방지: 말하는 중이면 정지
      try{ recog.start(); }catch(e){}    // 이미 시작됐으면 throw → 무시
    });
  })();
</script>
</body>
